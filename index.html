<style>
  :root{
    --paper:#f7f4ee; --card:#fffdf8; --ink:#201f1a; --muted:#6f6a5d;
    --line:#e4ded1; --line2:#efe9dd;
    --him:#46603a; --him-soft:#eaf0e3;
    --her:#8a4d68; --her-soft:#f3e7ee;
    --p:#46603a; --c:#b07d2b; --fat:#a05a3c;
    --ok:#3f7a3a; --warn:#b26a1f;
    --accent:var(--him); --accent-soft:var(--him-soft);
    --num:"SF Mono",ui-monospace,"DejaVu Sans Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  body.her{ --accent:var(--her); --accent-soft:var(--her-soft); }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);
    font-size:16px;line-height:1.4;-webkit-text-size-adjust:100%}
  .wrap{max-width:560px;margin:0 auto;padding:0 0 96px}
  header{position:sticky;top:0;z-index:20;background:var(--paper);
    padding:calc(env(safe-area-inset-top) + 12px) 16px 10px;border-bottom:1px solid var(--line)}
  .topline{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:12px}
  .brand{font-size:1.02rem;font-weight:700;letter-spacing:-.01em}
  .brand small{display:block;font-weight:500;color:var(--muted);font-size:.72rem;letter-spacing:.02em;text-transform:uppercase}
  .who{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--card)}
  .who button{appearance:none;border:0;background:transparent;font:inherit;font-weight:600;
    padding:8px 18px;color:var(--muted);cursor:pointer;font-size:.9rem;transition:.15s}
  .who button[aria-pressed="true"]{background:var(--accent);color:#fff}
  .rail{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:2px 0 2px}
  .rail::-webkit-scrollbar{display:none}
  .rail button{flex:0 0 auto;appearance:none;border:1px solid var(--line);background:var(--card);
    font:inherit;font-weight:600;font-size:.82rem;color:var(--muted);padding:7px 13px;border-radius:10px;cursor:pointer}
  .rail button[aria-current="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .rail .todaydot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);margin-left:6px;vertical-align:middle}
  .dayhead{padding:18px 16px 6px}
  .dayhead h1{margin:0;font-size:1.5rem;letter-spacing:-.02em}
  .dayhead .sub{color:var(--muted);font-size:.82rem;margin-top:2px}
  .daysum{margin:14px 16px 4px;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:13px 14px}
  .daysum .kcal{font-family:var(--num);font-size:1.7rem;font-weight:600;letter-spacing:-.02em}
  .daysum .kcal span{font-family:var(--sans);font-size:.8rem;color:var(--muted);font-weight:500;margin-left:6px}
  .floor{display:inline-flex;align-items:center;gap:5px;font-size:.76rem;font-weight:600;padding:3px 9px;border-radius:999px;margin-top:2px}
  .floor.ok{background:#e7f1e5;color:var(--ok)} .floor.under{background:#f6ecdb;color:var(--warn)}
  .sumrow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
  .sumrow .lab{font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .sumrow .val{font-family:var(--num);font-weight:600;font-size:1rem}
  .sumrow .pct{font-family:var(--num);font-size:.72rem;color:var(--muted)}
  .meal{margin:12px 16px;border:1px solid var(--line);background:var(--card);border-radius:16px;overflow:hidden}
  .mtop{padding:14px 15px 10px}
  .mname{font-weight:700;font-size:1.02rem;letter-spacing:-.01em;line-height:1.25}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tag{font-size:.68rem;font-weight:600;letter-spacing:.02em;text-transform:uppercase;padding:3px 8px;border-radius:6px;background:var(--line2);color:var(--muted)}
  .tag.lpr{background:#f6e9df;color:#9a5a34}
  .mkcal{display:flex;align-items:baseline;gap:8px;margin-top:12px}
  .mkcal b{font-family:var(--num);font-size:1.5rem;font-weight:600;letter-spacing:-.02em}
  .mkcal .of{font-size:.78rem;color:var(--muted)}
  .srcbar{display:flex;height:8px;border-radius:5px;overflow:hidden;margin-top:10px;background:var(--line2)}
  .srcbar i{display:block;height:100%}
  .srcleg{display:flex;gap:12px;margin-top:7px;flex-wrap:wrap}
  .srcleg span{font-family:var(--num);font-size:.7rem;color:var(--muted);display:inline-flex;align-items:center;gap:5px}
  .dot{width:8px;height:8px;border-radius:2px;display:inline-block}
  .macros{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line2);border-top:1px solid var(--line2);border-bottom:1px solid var(--line2);margin-top:13px}
  .macros .m{background:var(--card);padding:10px 12px}
  .macros .mlab{font-size:.64rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .macros .mval{font-family:var(--num);font-weight:600;font-size:1.05rem;margin-top:2px}
  .macros .mpct{font-family:var(--num);font-size:.72rem;color:var(--muted)}
  .checks{padding:6px 6px 8px}
  .chk{display:flex;align-items:center;gap:12px;padding:11px 10px;border-radius:10px;cursor:pointer;user-select:none}
  .chk:active{background:var(--accent-soft)}
  .box{flex:0 0 auto;width:22px;height:22px;border-radius:6px;border:2px solid var(--line);display:grid;place-items:center;transition:.12s}
  .chk[data-on="1"] .box{background:var(--accent);border-color:var(--accent)}
  .box svg{width:13px;height:13px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:.12s}
  .chk[data-on="1"] .box svg{opacity:1}
  .chk .nm{flex:1;font-size:.94rem}
  .chk[data-on="1"] .nm{color:var(--muted);text-decoration:line-through}
  .chk .amt{font-family:var(--num);font-weight:600;font-size:.95rem;white-space:nowrap}
  .chk .amt em{font-style:normal;color:var(--muted);font-weight:500;font-size:.78rem;margin-left:2px}
  .note{padding:2px 16px 15px;color:var(--muted);font-size:.82rem;line-height:1.45}
  .note b{color:var(--ink);font-weight:600}
  .dayfoot{display:flex;justify-content:flex-end;padding:2px 16px 4px}
  .reset{appearance:none;border:1px solid var(--line);background:var(--card);font:inherit;font-size:.76rem;color:var(--muted);padding:6px 11px;border-radius:9px;cursor:pointer}
  footer{margin:26px 16px 0;color:var(--muted);font-size:.74rem;line-height:1.5;border-top:1px solid var(--line);padding-top:14px}
  footer b{color:var(--ink)}
  .state{padding:56px 24px;text-align:center;color:var(--muted)}
  .state h2{color:var(--ink);font-size:1.1rem;margin:0 0 8px}
  .state code{font-family:var(--num);font-size:.82rem;background:var(--line2);padding:2px 6px;border-radius:5px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topline">
      <div class="brand">This Week<small>Meal Prep</small></div>
      <div class="who" role="group" aria-label="Whose portions">
        <button id="wHim" aria-pressed="true">His</button>
        <button id="wHer" aria-pressed="false">Hers</button>
      </div>
    </div>
    <nav class="rail" id="rail" aria-label="Day"></nav>
  </header>
  <main id="day"><div class="state">Loading this week…</div></main>
  <footer id="foot"></footer>
</div>

<script>
let DB=null, order=[], todayKey='monday', dayKey='monday';
let who='him';

const mem={};
const store={
  get(k){ try{ const v=localStorage.getItem(k); return v===null?(k in mem?mem[k]:null):v; }catch(e){ return k in mem?mem[k]:null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } },
  del(k){ try{ localStorage.removeItem(k); }catch(e){} delete mem[k]; }
};

function nutOf(ing, amt){ const n=DB.nutrition[ing]; const k=n.basis==='100g'?amt/100:amt;
  return {kcal:n.kcal*k,p:n.p*k,c:n.c*k,fib:n.fib*k,f:n.f*k}; }
function mealTotals(meal, w){ const t={kcal:0,p:0,c:0,fib:0,f:0};
  for(const cp of meal.comps){ const a=cp[w]; if(a){ const x=nutOf(cp.ing,a); for(const k in t)t[k]+=x[k]; } } return t; }
function dayTotals(dk, w){ const d=DB.days[dk]; const t={kcal:0,p:0,c:0,fib:0,f:0};
  for(const m of d.meals){ const mt=mealTotals(m,w); for(const k in t)t[k]+=mt[k]; }
  if(d.shake[w]){ const x=nutOf('koia',d.shake[w]); for(const k in t)t[k]+=x[k]; } return t; }
const pct=(v,t)=> t?Math.round(v/t*100):0;
const FRAC={0.25:'¼',0.5:'½',0.75:'¾'};
function fmtAmt(v){ const wh=Math.floor(v), fr=+(v-wh).toFixed(2);
  if(FRAC[fr]) return (wh?wh:'')+FRAC[fr]; return String(Math.round(v)); }
function ckey(mealIdx, compIdx){ return `mp1::chk::${DB.weekId||'wk'}::${who}::${dayKey}::${mealIdx}::${compIdx}`; }

function buildRail(){
  const rail=document.getElementById('rail'); rail.innerHTML='';
  order.forEach(k=>{
    const b=document.createElement('button');
    b.textContent=DB.days[k].label.slice(0,3);
    if(k===todayKey){ const s=document.createElement('span'); s.className='todaydot'; b.appendChild(s); }
    b.setAttribute('aria-current', k===dayKey?'true':'false');
    b.onclick=()=>{ dayKey=k; try{history.replaceState(null,'','#'+k);}catch(e){} render();
      b.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'}); };
    rail.appendChild(b);
    if(k===dayKey) requestAnimationFrame(()=>b.scrollIntoView({inline:'center',block:'nearest'}));
  });
}

function mealCard(meal, idx){
  const t=mealTotals(meal, who), tgt=DB.targets[who];
  const kP=t.p*4, kC=t.c*4, kF=t.f*9, kSum=Math.max(kP+kC+kF,1);
  const el=document.createElement('section'); el.className='meal';
  const tagMap={fresh:'Fresh',packed:'Packed',reheat:'Reheat','prev-night':'Made night before',anchor:'Anytime'};
  let tags=`<span class="tag">${tagMap[meal.tag]||meal.tag}</span>`;
  if(meal.lpr) tags+=`<span class="tag lpr">⚠ His LPR</span>`;
  el.innerHTML=`
    <div class="mtop">
      <div class="mname">${meal.name}</div>
      <div class="tags">${tags}</div>
      <div class="mkcal"><b>${Math.round(t.kcal)}</b><span class="of">kcal · ${pct(t.kcal,tgt.kcal)}% of day</span></div>
      <div class="srcbar">
        <i style="width:${kP/kSum*100}%;background:var(--p)"></i>
        <i style="width:${kC/kSum*100}%;background:var(--c)"></i>
        <i style="width:${kF/kSum*100}%;background:var(--fat)"></i>
      </div>
      <div class="srcleg">
        <span><i class="dot" style="background:var(--p)"></i>Protein ${Math.round(kP)}</span>
        <span><i class="dot" style="background:var(--c)"></i>Carbs ${Math.round(kC)}</span>
        <span><i class="dot" style="background:var(--fat)"></i>Fat ${Math.round(kF)}</span>
      </div>
    </div>
    <div class="macros">
      <div class="m"><div class="mlab">Protein</div><div class="mval">${Math.round(t.p)}g</div><div class="mpct">(${pct(t.p,tgt.p)}%)</div></div>
      <div class="m"><div class="mlab">Carbs</div><div class="mval">${Math.round(t.c)}g</div><div class="mpct">(${pct(t.c,tgt.c)}%)</div></div>
      <div class="m"><div class="mlab">Fiber</div><div class="mval">${Math.round(t.fib)}g</div><div class="mpct">(${pct(t.fib,tgt.fib)}%)</div></div>
      <div class="m"><div class="mlab">Fat</div><div class="mval">${Math.round(t.f)}g</div><div class="mpct">(${pct(t.f,tgt.f)}%)</div></div>
    </div>
    <div class="checks"></div>
    ${meal.note?`<div class="note">${meal.note}</div>`:''}`;
  const checks=el.querySelector('.checks');
  meal.comps.forEach((cp,ci)=>{
    const amt=cp[who]; if(!amt) return;
    const lab=DB.labels[cp.ing], key=ckey(idx,ci), on=store.get(key)==='1';
    const row=document.createElement('div');
    row.className='chk'; row.setAttribute('data-on',on?'1':'0'); row.setAttribute('role','checkbox');
    row.setAttribute('aria-checked',on?'true':'false');
    row.innerHTML=`<span class="box"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
      <span class="nm">${lab.name}</span><span class="amt">${fmtAmt(amt)}<em>${lab.unit}</em></span>`;
    row.onclick=()=>{ const now=row.getAttribute('data-on')==='1'?'0':'1';
      row.setAttribute('data-on',now); row.setAttribute('aria-checked',now==='1'?'true':'false');
      if(now==='1') store.set(key,'1'); else store.del(key); };
    checks.appendChild(row);
  });
  return el;
}

function render(){
  document.body.classList.toggle('her', who==='her');
  document.getElementById('wHim').setAttribute('aria-pressed', who==='him');
  document.getElementById('wHer').setAttribute('aria-pressed', who==='her');
  buildRail();
  const d=DB.days[dayKey], tgt=DB.targets[who], dt=dayTotals(dayKey,who);
  const floorMet=dt.p>=(who==='him'?180:100);
  const main=document.getElementById('day');
  const list=[...d.meals];
  if(d.shake[who]) list.push({name:'Anytime — Koia Elite shake',tag:'anchor',comps:[{ing:'koia',him:d.shake.him,her:d.shake.her}]});
  main.innerHTML=`
    <div class="dayhead"><h1>${d.label}${dayKey===todayKey?' · Today':''}</h1><div class="sub">${d.sub}</div></div>
    <div class="daysum">
      <div class="kcal">${Math.round(dt.kcal)}<span>kcal · ${pct(dt.kcal,tgt.kcal)}% of ${tgt.kcal} target</span></div>
      <div class="floor ${floorMet?'ok':'under'}">${floorMet?'✓ protein floor met':'protein under floor'} · ${Math.round(dt.p)}g</div>
      <div class="sumrow">
        <div><div class="lab">Protein</div><div class="val">${Math.round(dt.p)}g</div><div class="pct">${pct(dt.p,tgt.p)}%</div></div>
        <div><div class="lab">Carbs</div><div class="val">${Math.round(dt.c)}g</div><div class="pct">${pct(dt.c,tgt.c)}%</div></div>
        <div><div class="lab">Fiber</div><div class="val">${Math.round(dt.fib)}g</div><div class="pct">${pct(dt.fib,tgt.fib)}%</div></div>
        <div><div class="lab">Fat</div><div class="val">${Math.round(dt.f)}g</div><div class="pct">${pct(dt.f,tgt.f)}%</div></div>
      </div>
    </div>`;
  list.forEach((m,i)=> main.appendChild(mealCard(m,i)));
  const foot=document.createElement('div'); foot.className='dayfoot';
  const rb=document.createElement('button'); rb.className='reset'; rb.textContent='Clear ticks · this day';
  rb.onclick=()=>{ list.forEach((m,i)=> m.comps.forEach((cp,ci)=> store.del(ckey(i,ci)))); render(); };
  foot.appendChild(rb); main.appendChild(foot);
}

function initFooter(){
  document.getElementById('foot').innerHTML=
    `<b>% shown is share of the daily target</b> (his ~2,250&nbsp;kcal / 190&nbsp;g&nbsp;protein · hers ~1,300 / 105), not of that day's plan — weekend day-totals read low on purpose (only breakfast is prepped). <b>Nutrition is estimated</b> from standard reference values per gram cooked. Ticks save on this device and reset when the plan's week changes. Add to Home Screen for a full-screen icon.`;
}

document.getElementById('wHim').onclick=()=>{ who='him'; store.set('mp1::person','him'); render(); };
document.getElementById('wHer').onclick=()=>{ who='her'; store.set('mp1::person','her'); render(); };

async function boot(){
  try{
    const res=await fetch('./data.json');
    if(!res.ok) throw new Error('HTTP '+res.status);
    DB=await res.json();
    order=DB.weekOrder;
    todayKey=order[(new Date().getDay()+6)%7];
    const h=(location.hash||'').replace('#','').toLowerCase();
    dayKey=order.includes(h)?h:todayKey;
    who=store.get('mp1::person')==='her'?'her':'him';
    initFooter();
    render();
  }catch(e){
    document.getElementById('day').innerHTML=
      `<div class="state"><h2>Couldn't load the plan</h2>
       This app reads <code>data.json</code> from the same folder. Make sure it's uploaded next to <code>index.html</code>, then reload.<br><br>(${String(e.message||e)})</div>`;
  }
}
boot();
</script>
</body>
</html>
